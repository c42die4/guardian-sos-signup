<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian SOS — Dispatcher Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      background: #1a1a1a;
      border-bottom: 2px solid #cc0000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 36px; height: 36px; background: #cc0000; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-title h1 { font-size: 18px; font-weight: 700; }
    .header-title p { font-size: 12px; color: #888; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse-dot 2s infinite;
    }

    .status-dot.offline { background: #666; animation: none; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .alert-count-badge {
      background: #cc0000;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      display: none;
    }

    .clock { font-size: 13px; color: #888; font-variant-numeric: tabular-nums; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 { font-size: 15px; font-weight: 700; }

    .filter-row {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 8px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #cc0000;
      border-color: #cc0000;
      color: #fff;
      font-weight: 600;
    }

    .alerts-list { flex: 1; overflow-y: auto; }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #555;
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .alert-card {
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .alert-card:hover { background: #1f1f1f; }
    .alert-card.selected { background: #1f1f1f; border-left: 3px solid #cc0000; }

    .alert-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .alert-name {
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .alert-name .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cc0000;
      animation: pulse-dot 1.5s infinite;
      flex-shrink: 0;
    }

    .alert-time { font-size: 11px; color: #666; }

    .alert-location { font-size: 12px; color: #777; margin-bottom: 8px; }

    .alert-actions { display: flex; gap: 6px; }

    .btn-sm {
      flex: 1;
      border: none;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-sm:hover { opacity: 0.85; }
    .btn-navigate { background: #1565c0; color: #fff; }
    .btn-resolve { background: #2e7d32; color: #fff; }
    .btn-profile { background: #e65100; color: #fff; }

    /* MAP */
    #map { flex: 1; }

    /* DETAIL PANEL */
    .detail-panel {
      width: 300px;
      background: #1a1a1a;
      border-left: 1px solid #2a2a2a;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-panel.open { display: flex; }

    .detail-header {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-header h3 { font-size: 15px; font-weight: 700; }

    .close-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .close-btn:hover { color: #fff; }

    .detail-body { flex: 1; overflow-y: auto; padding: 16px; }

    .detail-section { margin-bottom: 20px; }

    .detail-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #cc0000;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .detail-label { color: #666; width: 90px; flex-shrink: 0; }
    .detail-value { color: #eee; flex: 1; word-break: break-word; }

    .call-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1b5e20;
      border: none;
      border-radius: 4px;
      padding: 3px 8px;
      color: #4caf50;
      font-size: 12px;
      cursor: pointer;
      margin-top: 2px;
    }

    .detail-actions { padding: 16px; border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 8px; }

    .btn-full {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-full:hover { opacity: 0.85; }

    /* AUDIO */
    .audio-btn {
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .audio-btn.muted { color: #555; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Leaflet marker override */
    .custom-marker {
      background: #cc0000;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      box-shadow: 0 0 0 4px rgba(204,0,0,0.3);
      animation: marker-pulse 1.5s infinite;
    }

    .custom-marker.selected {
      background: #ff9800;
      box-shadow: 0 0 0 4px rgba(255,152,0,0.4);
    }

    @keyframes marker-pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(204,0,0,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(204,0,0,0.1); }
    }

    @media (max-width: 768px) {
      .sidebar { width: 260px; }
      .detail-panel { width: 260px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🛡️</div>
    <div class="header-title">
      <h1>Guardian SOS — Dispatcher</h1>
      <p>Live Emergency Response Dashboard</p>
    </div>
  </div>
  <div class="header-right">
    <div class="alert-count-badge" id="alertCountBadge">0 ACTIVE</div>
    <button class="audio-btn" id="audioBtn" onclick="toggleAudio()">🔊 Sound On</button>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <div class="clock" id="clock"></div>
  </div>
</header>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Active Alerts</h2>
      <span id="alertCount" style="color:#888;font-size:13px">0 alerts</span>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('ACTIVE', this)">🔴 Active</button>
      <button class="filter-btn" onclick="setFilter('RESOLVED', this)">✅ Resolved</button>
      <button class="filter-btn" onclick="setFilter('CANCELLED', this)">❌ Cancelled</button>
    </div>
    <div class="alerts-list" id="alertsList">
      <div class="empty-state">
        <div class="icon">📡</div>
        <p>Connecting to live feed...</p>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailName">Alert Details</h3>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-actions" id="detailActions"></div>
  </div>

</div>

<script>
  // ── Firebase ─────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyA1yIuvCuplOsaPgRXSCcjOz2z3ful5AeM",
    authDomain: "guardian-os-80042.firebaseapp.com",
    projectId: "guardian-os-80042",
    storageBucket: "guardian-os-80042.firebasestorage.app",
    messagingSenderId: "293568464040",
    appId: "1:293568464040:web:610554596a3803acfd2e9d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── Map ──────────────────────────────────────
  const map = L.map('map').setView([-26.107, 28.05], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // ── State ────────────────────────────────────
  let alerts = {};
  let markers = {};
  let selectedId = null;
  let currentFilter = 'ACTIVE';
  let audioEnabled = true;
  let isConnected = false;
  let lastAlertCount = 0;

  // ── Clock ────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Audio ────────────────────────────────────
  function toggleAudio() {
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('audioBtn');
    btn.textContent = audioEnabled ? '🔊 Sound On' : '🔇 Sound Off';
    btn.classList.toggle('muted', !audioEnabled);
  }

  function playAlert() {
    if (!audioEnabled) return;
    try {
      const ctx = new AudioContext();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.frequency.setValueAtTime(880, ctx.currentTime);
      oscillator.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
      oscillator.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }

  // ── Filter ───────────────────────────────────
  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAlerts();
    renderMarkers();
  }

  // ── Time ago ─────────────────────────────────
  function timeAgo(timestamp) {
    if (!timestamp) return 'Just now';
    const dt = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const diff = Math.floor((Date.now() - dt) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  // ── Render sidebar ───────────────────────────
  function renderAlerts() {
    const list = document.getElementById('alertsList');
    const filtered = Object.entries(alerts)
      .filter(([_, a]) => a.status === currentFilter)
      .sort((a, b) => {
        const ta = a[1].timestamp?.toDate?.() || 0;
        const tb = b[1].timestamp?.toDate?.() || 0;
        return tb - ta;
      });

    const activeCount = Object.values(alerts).filter(a => a.status === 'ACTIVE').length;
    document.getElementById('alertCount').textContent =
      filtered.length + ' alert' + (filtered.length !== 1 ? 's' : '');

    const badge = document.getElementById('alertCountBadge');
    if (activeCount > 0) {
      badge.textContent = activeCount + ' ACTIVE';
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="icon">${currentFilter === 'ACTIVE' ? '✅' : '📋'}</div>
        <p>${currentFilter === 'ACTIVE' ? 'No active alerts' : 'No ' + currentFilter.toLowerCase() + ' alerts'}</p>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(([id, alert]) => `
      <div class="alert-card ${id === selectedId ? 'selected' : ''}" onclick="selectAlert('${id}')">
        <div class="alert-card-header">
          <div class="alert-name">
            ${alert.status === 'ACTIVE' ? '<div class="dot"></div>' : ''}
            ${escHtml(alert.userName || 'Unknown')}
          </div>
          <div class="alert-time">${timeAgo(alert.timestamp)}</div>
        </div>
        <div class="alert-location">📍 ${alert.lat?.toFixed(5) || '?'}, ${alert.lng?.toFixed(5) || '?'}</div>
        ${alert.status === 'ACTIVE' ? `
        <div class="alert-actions">
          <button class="btn-sm btn-navigate" onclick="event.stopPropagation(); navigateTo(${alert.lat}, ${alert.lng})">🗺 Navigate</button>
          <button class="btn-sm btn-resolve" onclick="event.stopPropagation(); resolveAlert('${id}')">✅ Resolve</button>
          <button class="btn-sm btn-profile" onclick="event.stopPropagation(); selectAlert('${id}')">👤 Profile</button>
        </div>` : ''}
      </div>
    `).join('');
  }

  // ── Render markers ───────────────────────────
  function renderMarkers() {
    // Remove old markers
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};

    const filtered = Object.entries(alerts).filter(([_, a]) => a.status === currentFilter);

    filtered.forEach(([id, alert]) => {
      if (!alert.lat || !alert.lng) return;
      const isSelected = id === selectedId;
      const icon = L.divIcon({
        className: '',
        html: `<div class="custom-marker ${isSelected ? 'selected' : ''}"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });

      const marker = L.marker([alert.lat, alert.lng], { icon })
        .addTo(map)
        .bindTooltip(alert.userName || 'Unknown', { permanent: true, direction: 'top', offset: [0, -10] })
        .on('click', () => selectAlert(id));

      markers[id] = marker;
    });

    // Fit map to markers if active
    if (currentFilter === 'ACTIVE' && filtered.length > 0) {
      const points = filtered.map(([_, a]) => [a.lat, a.lng]);
      if (points.length === 1) {
        map.setView(points[0], 16);
      } else {
        map.fitBounds(points, { padding: [60, 60] });
      }
    }
  }

  // ── Select alert ─────────────────────────────
  function selectAlert(id) {
    selectedId = id;
    const alert = alerts[id];
    if (!alert) return;

    renderAlerts();
    renderMarkers();

    if (alert.lat && alert.lng) {
      map.setView([alert.lat, alert.lng], 17);
    }

    // Open detail panel
    showDetail(id, alert);
  }

  // ── Detail panel ─────────────────────────────
  function showDetail(id, alert) {
    const panel = document.getElementById('detailPanel');
    const profile = alert.profile || {};

    document.getElementById('detailName').textContent = alert.userName || 'Unknown';

    const body = document.getElementById('detailBody');
    body.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">🚨 Alert Info</div>
        <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${alert.status}</span></div>
        <div class="detail-row"><span class="detail-label">Time</span><span class="detail-value">${timeAgo(alert.timestamp)}</span></div>
        <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${alert.lat?.toFixed(5)}, ${alert.lng?.toFixed(5)}</span></div>
      </div>

      ${profile.name ? `
      <div class="detail-section">
        <div class="detail-section-title">👤 Personal</div>
        ${detailRow('Name', profile.name)}
        ${detailRow('ID Number', profile.idNumber)}
        ${detailRow('Age', profile.age)}
        ${detailRow('Blood Type', profile.bloodType)}
      </div>` : ''}

      ${(profile.allergies || profile.conditions || profile.medications) ? `
      <div class="detail-section">
        <div class="detail-section-title">💊 Medical</div>
        ${detailRow('Allergies', profile.allergies)}
        ${detailRow('Conditions', profile.conditions)}
        ${detailRow('Medications', profile.medications)}
      </div>` : ''}

      ${(profile.contact1Name || profile.contact2Name) ? `
      <div class="detail-section">
        <div class="detail-section-title">📞 Emergency Contacts</div>
        ${profile.contact1Name ? `
          ${detailRow('Contact 1', profile.contact1Name)}
          ${detailRow('Relationship', profile.contact1Rel)}
          ${callRow('Phone', profile.contact1Phone)}
        ` : ''}
        ${profile.contact2Name ? `
          <hr style="border-color:#222;margin:8px 0"/>
          ${detailRow('Contact 2', profile.contact2Name)}
          ${detailRow('Relationship', profile.contact2Rel)}
          ${callRow('Phone', profile.contact2Phone)}
        ` : ''}
      </div>` : ''}

      ${(profile.homeAddress || profile.workAddress) ? `
      <div class="detail-section">
        <div class="detail-section-title">🏠 Addresses</div>
        ${detailRow('Home', profile.homeAddress)}
        ${detailRow('Work', profile.workAddress)}
      </div>` : ''}
    `;

    const actions = document.getElementById('detailActions');
    if (alert.status === 'ACTIVE') {
      actions.innerHTML = `
        <button class="btn-full" style="background:#1565c0;color:#fff" onclick="navigateTo(${alert.lat}, ${alert.lng})">🗺 Open in Google Maps</button>
        <button class="btn-full" style="background:#2e7d32;color:#fff" onclick="resolveAlert('${id}')">✅ Mark as Resolved</button>
      `;
    } else {
      actions.innerHTML = `<p style="color:#666;font-size:13px;text-align:center">This alert has been ${alert.status.toLowerCase()}.</p>`;
    }

    panel.classList.add('open');
  }

  function detailRow(label, value) {
    if (!value) return '';
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${escHtml(value)}</span></div>`;
  }

  function callRow(label, phone) {
    if (!phone) return '';
    return `<div class="detail-row">
      <span class="detail-label">${label}</span>
      <span class="detail-value">
        ${escHtml(phone)}
        <br><button class="call-btn" onclick="window.open('tel:${phone}')">📞 Call</button>
      </span>
    </div>`;
  }

  function closeDetail() {
    selectedId = null;
    document.getElementById('detailPanel').classList.remove('open');
    renderAlerts();
    renderMarkers();
  }

  // ── Actions ──────────────────────────────────
  function navigateTo(lat, lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
  }

  async function resolveAlert(id) {
    if (!confirm('Mark this alert as resolved?')) return;
    await db.collection('alerts').doc(id).update({ status: 'RESOLVED' });
    if (selectedId === id) closeDetail();
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Firebase listener ────────────────────────
  function setConnected(connected) {
    isConnected = connected;
    document.getElementById('statusDot').className = 'status-dot' + (connected ? '' : ' offline');
    document.getElementById('statusText').textContent = connected ? 'Live' : 'Disconnected';
  }

  db.collection('alerts')
    .orderBy('timestamp', 'descending')
    .limit(100)
    .onSnapshot(snapshot => {
      setConnected(true);

      snapshot.docChanges().forEach(change => {
        const id = change.doc.id;
        const data = change.doc.data();

        if (change.type === 'added') {
          alerts[id] = data;
          // Play alert for new active alerts
          if (data.status === 'ACTIVE' && lastAlertCount > 0) {
            playAlert();
          }
        } else if (change.type === 'modified') {
          alerts[id] = data;
        } else if (change.type === 'removed') {
          delete alerts[id];
          if (markers[id]) {
            map.removeLayer(markers[id]);
            delete markers[id];
          }
        }
      });

      const activeCount = Object.values(alerts).filter(a => a.status === 'ACTIVE').length;
      lastAlertCount = activeCount;

      renderAlerts();
      renderMarkers();
    }, error => {
      setConnected(false);
      console.error('Firestore error:', error);
    });

  // Update time-ago labels every 30 seconds
  setInterval(() => {
    renderAlerts();
  }, 30000);
</script>

</body>
</html>
