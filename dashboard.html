<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Dispatch</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    nav { background: #111; border-bottom: 1px solid #1f1f1f; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .nav-brand { display: flex; align-items: center; gap: 8px; }
    .nav-icon { width: 28px; height: 28px; background: #cc0000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .nav-brand span { font-size: 14px; font-weight: 700; color: #fff; }
    .nav-links { display: flex; gap: 6px; align-items: center; }
    .nav-link { background: none; border: 1px solid #2a2a2a; border-radius: 6px; padding: 5px 10px; color: #aaa; font-size: 12px; text-decoration: none; transition: all 0.2s; }
    .nav-link:hover { border-color: #cc0000; color: #fff; }
    .nav-link.active { border-color: #cc0000; color: #fff; background: rgba(204,0,0,0.1); }
    .nav-saved { font-size: 11px; color: #4caf50; background: rgba(46,125,50,0.15); border: 1px solid #2e7d32; border-radius: 6px; padding: 4px 8px; display: none; }
    .nav-saved.visible { display: block; }
    .nav-signout { background: none; border: 1px solid #333; border-radius: 6px; padding: 4px 8px; color: #666; font-size: 11px; cursor: pointer; }
    .nav-signout:hover { border-color: #cc0000; color: #cc0000; }
    @media (max-width: 600px) { .nav-links { display: none; } }

    .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 36px; width: 100%; max-width: 400px; text-align: center; }
    .login-box .logo-lg { font-size: 44px; margin-bottom: 14px; }
    .login-box h2 { font-size: 20px; margin-bottom: 6px; }
    .login-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
    .login-box input { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; padding: 13px 16px; color: #f0f0f0; font-size: 16px; text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; outline: none; }
    .login-box input:focus { border-color: #cc0000; }
    .remember-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; cursor: pointer; }
    .remember-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #cc0000; cursor: pointer; }
    .remember-row label { font-size: 13px; color: #888; cursor: pointer; }
    .login-btn { width: 100%; background: #cc0000; color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-btn:hover { background: #aa0000; }
    .login-btn:disabled { background: #333; cursor: not-allowed; }
    .login-error { color: #ff6666; font-size: 13px; margin-top: 10px; min-height: 18px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    header { background: #1a1a1a; border-bottom: 2px solid #cc0000; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 32px; height: 32px; background: #cc0000; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .header-title h1 { font-size: 16px; font-weight: 700; }
    .header-title p { font-size: 11px; color: #888; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .alert-count-badge { background: #cc0000; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; display: none; }
    .audio-btn { background: #1f1f1f; border: 1px solid #333; border-radius: 6px; padding: 5px 10px; color: #aaa; font-size: 12px; cursor: pointer; }
    .status-badge { display: flex; align-items: center; gap: 6px; background: #1f1f1f; border: 1px solid #333; border-radius: 20px; padding: 5px 10px; font-size: 12px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; animation: pulse-dot 2s infinite; }
    .status-dot.offline { background: #666; animation: none; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .clock { font-size: 12px; color: #888; }

    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 300px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .sidebar-header { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header h2 { font-size: 14px; font-weight: 700; }
    .filter-row { padding: 8px 12px; border-bottom: 1px solid #2a2a2a; display: flex; gap: 6px; }
    .filter-btn { flex: 1; background: #111; border: 1px solid #333; border-radius: 6px; padding: 5px 6px; color: #aaa; font-size: 11px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .filter-btn.active { background: #cc0000; border-color: #cc0000; color: #fff; font-weight: 600; }
    .alerts-list { flex: 1; overflow-y: auto; }
    .empty-state { padding: 40px 20px; text-align: center; color: #555; }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }
    .alert-card { padding: 12px 14px; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.15s; }
    .alert-card:hover { background: #1f1f1f; }
    .alert-card.selected { background: #1f1f1f; border-left: 3px solid #cc0000; }
    .alert-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .alert-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    .alert-name .dot { width: 7px; height: 7px; border-radius: 50%; background: #cc0000; animation: pulse-dot 1.5s infinite; flex-shrink: 0; }
    .alert-time { font-size: 11px; color: #666; }
    .alert-location { font-size: 11px; color: #666; margin-bottom: 6px; }
    .alert-actions { display: flex; gap: 5px; }
    .btn-sm { flex: 1; border: none; border-radius: 5px; padding: 5px 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-navigate { background: #1565c0; color: #fff; }
    .btn-resolve { background: #2e7d32; color: #fff; }
    .btn-profile { background: #e65100; color: #fff; }

    #map { flex: 1; }
    .detail-panel { width: 280px; background: #1a1a1a; border-left: 1px solid #2a2a2a; display: none; flex-direction: column; overflow: hidden; }
    .detail-panel.open { display: flex; }
    .detail-header { padding: 12px 14px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
    .detail-header h3 { font-size: 14px; font-weight: 700; }
    .close-btn { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
    .detail-body { flex: 1; overflow-y: auto; padding: 14px; }
    .detail-section { margin-bottom: 16px; }
    .detail-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #cc0000; margin-bottom: 8px; }
    .detail-row { display: flex; gap: 6px; margin-bottom: 5px; font-size: 12px; }
    .detail-label { color: #666; width: 80px; flex-shrink: 0; }
    .detail-value { color: #eee; flex: 1; word-break: break-word; }
    .call-btn { display: inline-flex; align-items: center; gap: 3px; background: #1b5e20; border: none; border-radius: 4px; padding: 2px 7px; color: #4caf50; font-size: 11px; cursor: pointer; margin-top: 2px; }
    .detail-actions { padding: 12px 14px; border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 6px; }
    .btn-full { width: 100%; border: none; border-radius: 7px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }

    .custom-marker { background: #cc0000; border: 2px solid #fff; border-radius: 50%; width: 14px; height: 14px; box-shadow: 0 0 0 4px rgba(204,0,0,0.3); animation: marker-pulse 1.5s infinite; }
    .custom-marker.selected { background: #ff9800; box-shadow: 0 0 0 4px rgba(255,152,0,0.4); }
    @keyframes marker-pulse { 0%, 100% { box-shadow: 0 0 0 4px rgba(204,0,0,0.3); } 50% { box-shadow: 0 0 0 8px rgba(204,0,0,0.1); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-icon">🛡️</div>
    <span>Secure Response</span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="company-admin.html" class="nav-link">Company Portal</a>
    <a href="dashboard.html" class="nav-link active">Dispatcher</a>
    <a href="signup.html" class="nav-link">Sign Up</a>
    <span class="nav-saved" id="navSaved"></span>
    <button class="nav-signout" id="navSignout" onclick="signOut()" style="display:none">Sign Out</button>
  </div>
</nav>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="logo-lg">🗺️</div>
    <h2>Dispatcher Access</h2>
    <p>Enter your access code to view live alerts.</p>
    <input type="text" id="loginCode" placeholder="ACCESS CODE" autocomplete="off" />
    <div class="remember-row">
      <input type="checkbox" id="rememberMe" checked />
      <label for="rememberMe">Remember me on this device</label>
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">Continue</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header id="mainHeader" style="display:none">
  <div class="header-left">
    <div class="logo" id="headerLogo">🛡️</div>
    <div class="header-title">
      <h1 id="companyName">Dispatcher</h1>
      <p>Live Response Dashboard</p>
    </div>
  </div>
  <div class="header-right">
    <div class="alert-count-badge" id="alertCountBadge"></div>
    <button class="audio-btn" onclick="toggleAudio()">🔊 <span id="audioLabel">Sound On</span></button>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <div class="clock" id="clock"></div>
  </div>
</header>

<div class="main" id="mainContent" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Alerts</h2>
      <span id="alertCount" style="color:#888;font-size:12px">0 alerts</span>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('ACTIVE',this)">🔴 Active</button>
      <button class="filter-btn" onclick="setFilter('RESOLVED',this)">✅ Resolved</button>
      <button class="filter-btn" onclick="setFilter('CANCELLED',this)">❌ Cancelled</button>
    </div>
    <div class="alerts-list" id="alertsList">
      <div class="empty-state"><div class="icon">📡</div><p>Connecting...</p></div>
    </div>
  </div>
  <div id="map"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailName">Alert Details</h3>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-actions" id="detailActions"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA1yIuvCuplOsaPgRXSCcjOz2z3ful5AeM",
    authDomain: "guardian-os-80042.firebaseapp.com",
    projectId: "guardian-os-80042",
    storageBucket: "guardian-os-80042.firebasestorage.app",
    messagingSenderId: "293568464040",
    appId: "1:293568464040:web:610554596a3803acfd2e9d"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const map = L.map('map').setView([-26.107, 28.05], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

  let alerts = {}, markers = {}, selectedId = null, currentFilter = 'ACTIVE';
  let audioEnabled = true, lastAlertCount = 0, unsubscribe = null;
  let currentCompanyId = null, currentCompanyName = null;

  // ── Clock ──────────────────────────────────
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }, 1000);

  // ── Auto-login from localStorage ──────────
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('srp_officer_code');
    if (saved) {
      document.getElementById('loginCode').value = saved;
      login(true);
    }
  });

  // ── Login ──────────────────────────────────
  async function login(auto = false) {
    const code = document.getElementById('loginCode').value.trim().toUpperCase();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    const remember = document.getElementById('rememberMe').checked;

    if (!code) { errorEl.textContent = 'Please enter your access code.'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verifying...';
    errorEl.textContent = '';

    try {
      const query = await db.collection('companies').where('officerCode', '==', code).limit(1).get();
      if (query.empty) {
        errorEl.textContent = 'Invalid code. Please try again.';
        btn.disabled = false; btn.textContent = 'Continue';
        if (auto) { localStorage.removeItem('srp_officer_code'); localStorage.removeItem('srp_company_name'); }
        return;
      }
      const doc = query.docs[0];
      const data = doc.data();
      if (!data.isActive) {
        errorEl.textContent = 'Subscription suspended. Please contact support.';
        btn.disabled = false; btn.textContent = 'Continue'; return;
      }

      currentCompanyId = doc.id;
      currentCompanyName = data.name;

      if (remember) {
        localStorage.setItem('srp_officer_code', code);
        localStorage.setItem('srp_company_name', data.name);
      }

      // Update nav
      document.getElementById('navSaved').textContent = '✅ ' + data.name;
      document.getElementById('navSaved').classList.add('visible');
      document.getElementById('navSignout').style.display = 'block';

      // Update header
      document.getElementById('companyName').textContent = data.name + ' — Dispatcher';
      if (data.logoUrl) {
        document.getElementById('headerLogo').innerHTML = `<img src="${data.logoUrl}" style="width:32px;height:32px;border-radius:7px;object-fit:contain" onerror="this.parentElement.textContent='🛡️'" />`;
      }

      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainHeader').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'flex';
      setTimeout(() => map.invalidateSize(), 100);

      startListening(doc.id);
    } catch(e) {
      errorEl.textContent = 'Connection error. Please try again.';
      btn.disabled = false; btn.textContent = 'Continue';
    }
  }

  document.getElementById('loginCode').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function signOut() {
    localStorage.removeItem('srp_officer_code');
    localStorage.removeItem('srp_company_name');
    if (unsubscribe) unsubscribe();
    location.reload();
  }

  // ── Firebase listener ──────────────────────
  function startListening(companyId) {
    if (unsubscribe) unsubscribe();
    alerts = {}; markers = {};
    unsubscribe = db.collection('alerts').where('companyId', '==', companyId).onSnapshot(snapshot => {
      setConnected(true);
      snapshot.docChanges().forEach(change => {
        const id = change.doc.id, data = change.doc.data();
        if (change.type === 'added') {
          alerts[id] = data;
          if (data.status === 'ACTIVE' && lastAlertCount > 0) playAlert();
        } else if (change.type === 'modified') {
          alerts[id] = data;
        } else if (change.type === 'removed') {
          delete alerts[id];
          if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
        }
      });
      const activeCount = Object.values(alerts).filter(a => a.status === 'ACTIVE').length;
      lastAlertCount = activeCount;
      const badge = document.getElementById('alertCountBadge');
      if (activeCount > 0) { badge.textContent = activeCount + ' ACTIVE'; badge.style.display = 'block'; }
      else badge.style.display = 'none';
      renderAlerts(); renderMarkers();
    }, () => setConnected(false));
  }

  function setConnected(ok) {
    document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' offline');
    document.getElementById('statusText').textContent = ok ? 'Live' : 'Disconnected';
  }

  function toggleAudio() {
    audioEnabled = !audioEnabled;
    document.getElementById('audioLabel').textContent = audioEnabled ? 'Sound On' : 'Sound Off';
  }

  function playAlert() {
    if (!audioEnabled) return;
    try {
      const ctx = new AudioContext(), osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }

  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAlerts(); renderMarkers();
  }

  function timeAgo(ts) {
    if (!ts) return 'Just now';
    const dt = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - dt) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  function renderAlerts() {
    const list = document.getElementById('alertsList');
    const filtered = Object.entries(alerts).filter(([_,a]) => a.status === currentFilter)
      .sort((a,b) => { const ta = a[1].timestamp?.toDate?.() || 0, tb = b[1].timestamp?.toDate?.() || 0; return tb - ta; });
    document.getElementById('alertCount').textContent = filtered.length + ' alert' + (filtered.length !== 1 ? 's' : '');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${currentFilter === 'ACTIVE' ? '✅' : '📋'}</div><p>No ${currentFilter.toLowerCase()} alerts</p></div>`;
      return;
    }
    list.innerHTML = filtered.map(([id, alert]) => `
      <div class="alert-card ${id === selectedId ? 'selected' : ''}" onclick="selectAlert('${id}')">
        <div class="alert-card-header">
          <div class="alert-name">${alert.status === 'ACTIVE' ? '<div class="dot"></div>' : ''}${escHtml(alert.userName||'Unknown')}</div>
          <div class="alert-time">${timeAgo(alert.timestamp)}</div>
        </div>
        <div class="alert-location">📍 ${alert.lat?.toFixed(4)||'?'}, ${alert.lng?.toFixed(4)||'?'}</div>
        ${alert.status === 'ACTIVE' ? `<div class="alert-actions">
          <button class="btn-sm btn-navigate" onclick="event.stopPropagation();navigateTo(${alert.lat},${alert.lng})">🗺 Nav</button>
          <button class="btn-sm btn-resolve" onclick="event.stopPropagation();resolveAlert('${id}')">✅ Resolve</button>
          <button class="btn-sm btn-profile" onclick="event.stopPropagation();selectAlert('${id}')">👤 Profile</button>
        </div>` : ''}
      </div>`).join('');
  }

  function renderMarkers() {
    Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};
    const filtered = Object.entries(alerts).filter(([_,a]) => a.status === currentFilter);
    filtered.forEach(([id, alert]) => {
      if (!alert.lat || !alert.lng) return;
      const icon = L.divIcon({ className: '', html: `<div class="custom-marker ${id === selectedId ? 'selected' : ''}"></div>`, iconSize: [14,14], iconAnchor: [7,7] });
      markers[id] = L.marker([alert.lat, alert.lng], {icon}).addTo(map)
        .bindTooltip(alert.userName||'Unknown', {permanent:true, direction:'top', offset:[0,-10]})
        .on('click', () => selectAlert(id));
    });
    if (currentFilter === 'ACTIVE' && filtered.length > 0) {
      const points = filtered.map(([_,a]) => [a.lat, a.lng]);
      if (points.length === 1) map.setView(points[0], 16);
      else map.fitBounds(points, {padding:[60,60]});
    }
  }

  function selectAlert(id) {
    selectedId = id;
    const alert = alerts[id];
    if (!alert) return;
    renderAlerts(); renderMarkers();
    if (alert.lat && alert.lng) map.setView([alert.lat, alert.lng], 17);
    showDetail(id, alert);
  }

  function showDetail(id, alert) {
    const profile = alert.profile || {};
    document.getElementById('detailName').textContent = alert.userName || 'Unknown';
    document.getElementById('detailBody').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">🚨 Alert Info</div>
        ${dRow('Status', alert.status)} ${dRow('Time', timeAgo(alert.timestamp))} ${dRow('Location', (alert.lat?.toFixed(4)||'?') + ', ' + (alert.lng?.toFixed(4)||'?'))}
      </div>
      ${profile.name ? `<div class="detail-section"><div class="detail-section-title">👤 Personal</div>${dRow('Name',profile.name)}${dRow('ID',profile.idNumber)}${dRow('Age',profile.age)}${dRow('Blood',profile.bloodType)}</div>` : ''}
      ${(profile.allergies||profile.conditions||profile.medications) ? `<div class="detail-section"><div class="detail-section-title">💊 Medical</div>${dRow('Allergies',profile.allergies)}${dRow('Conditions',profile.conditions)}${dRow('Medications',profile.medications)}</div>` : ''}
      ${(profile.contact1Name||profile.contact2Name) ? `<div class="detail-section"><div class="detail-section-title">📞 Contacts</div>${profile.contact1Name ? dRow('Contact 1',profile.contact1Name) + cRow('Phone',profile.contact1Phone) : ''}${profile.contact2Name ? dRow('Contact 2',profile.contact2Name) + cRow('Phone',profile.contact2Phone) : ''}</div>` : ''}
      ${(profile.homeAddress||profile.workAddress) ? `<div class="detail-section"><div class="detail-section-title">🏠 Addresses</div>${dRow('Home',profile.homeAddress)}${dRow('Work',profile.workAddress)}</div>` : ''}`;
    document.getElementById('detailActions').innerHTML = alert.status === 'ACTIVE' ? `
      <button class="btn-full" style="background:#1565c0;color:#fff" onclick="navigateTo(${alert.lat},${alert.lng})">🗺 Open in Google Maps</button>
      <button class="btn-full" style="background:#2e7d32;color:#fff" onclick="resolveAlert('${id}')">✅ Mark as Resolved</button>` :
      `<p style="color:#666;font-size:12px;text-align:center">Alert ${alert.status?.toLowerCase()}.</p>`;
    document.getElementById('detailPanel').classList.add('open');
  }

  function dRow(label, value) {
    if (!value) return '';
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${escHtml(value)}</span></div>`;
  }
  function cRow(label, phone) {
    if (!phone) return '';
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${escHtml(phone)}<br><button class="call-btn" onclick="window.open('tel:${phone}')">📞 Call</button></span></div>`;
  }
  function closeDetail() { selectedId = null; document.getElementById('detailPanel').classList.remove('open'); renderAlerts(); renderMarkers(); }
  function navigateTo(lat, lng) { window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank'); }
  async function resolveAlert(id) {
    if (!confirm('Mark as resolved?')) return;
    await db.collection('alerts').doc(id).update({status: 'RESOLVED'});
    if (selectedId === id) closeDetail();
  }
  function escHtml(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  setInterval(renderAlerts, 30000);
</script>
</body>
</html>
